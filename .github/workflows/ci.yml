name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: src/DryCar/DryCar.csproj
      - name: Restore
        run: dotnet restore DryCar.sln
      - name: Build
        run: dotnet build DryCar.sln --configuration Release --no-restore
      - name: Check Python syntax
        run: python -m py_compile src/DryCar/python/extract_vector.py
